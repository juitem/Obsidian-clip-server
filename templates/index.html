<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Web Clipper</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .container { max-width: 640px; width: 100%; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #cba6f7; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.85rem; margin-bottom: 0.3rem; color: #a6adc8; }
        input[type="url"] {
            width: 100%;
            padding: 0.6rem 0.8rem;
            background: #313244;
            border: 1px solid #45475a;
            border-radius: 6px;
            color: #cdd6f4;
            font-size: 1rem;
        }
        input[type="url"]:focus { outline: none; border-color: #cba6f7; }

        .checkboxes {
            display: flex; gap: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .checkboxes label {
            display: flex; align-items: center; gap: 0.4rem;
            font-size: 0.95rem; cursor: pointer; color: #cdd6f4;
        }

        button {
            width: 100%;
            padding: 0.7rem;
            background: #cba6f7;
            color: #1e1e2e;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .results { margin-top: 1.5rem; }
        .result-card {
            background: #313244;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-left: 4px solid #45475a;
        }
        .result-card.success { border-left-color: #a6e3a1; }
        .result-card.fail { border-left-color: #f38ba8; }

        .result-card h3 {
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .result-card.success h3 { color: #a6e3a1; }
        .result-card.fail h3 { color: #f38ba8; }

        .result-card p { font-size: 0.85rem; margin: 0.2rem 0; color: #a6adc8; }
        .result-card .filepath { word-break: break-all; color: #89b4fa; }
        .result-card .error-msg { color: #f38ba8; }

        .spinner {
            display: none;
            text-align: center;
            margin-top: 1.5rem;
            color: #a6adc8;
        }
        .spinner.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Obsidian Web Clipper</h1>

        <div class="form-group">
            <label for="url">URL</label>
            <input type="url" id="url" placeholder="https://example.com/article" autofocus>
        </div>

        <div class="checkboxes">
            <label><input type="checkbox" id="cb-trafilatura" checked> trafilatura</label>
            <label><input type="checkbox" id="cb-playwright" checked> playwright</label>
        </div>

        <button id="clip-btn" onclick="doClip()">Clip</button>

        <div class="spinner" id="spinner">Clipping...</div>
        <div class="results" id="results"></div>
    </div>

    <script>
        async function doClip() {
            const url = document.getElementById("url").value.trim();
            if (!url) return alert("URL을 입력하세요");

            const methods = [];
            if (document.getElementById("cb-trafilatura").checked) methods.push("trafilatura");
            if (document.getElementById("cb-playwright").checked) methods.push("playwright");
            if (methods.length === 0) return alert("방식을 하나 이상 선택하세요");

            const btn = document.getElementById("clip-btn");
            const spinner = document.getElementById("spinner");
            const resultsDiv = document.getElementById("results");

            btn.disabled = true;
            spinner.classList.add("active");
            resultsDiv.innerHTML = "";

            try {
                const resp = await fetch("/clip", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url, methods }),
                });
                const data = await resp.json();

                if (data.error) {
                    resultsDiv.innerHTML = `<div class="result-card fail"><h3>Error</h3><p class="error-msg">${data.error}</p></div>`;
                    return;
                }

                for (const r of data.results) {
                    const card = document.createElement("div");
                    card.className = `result-card ${r.success ? "success" : "fail"}`;

                    if (r.success) {
                        let obsNote = r.obsidian
                            ? "Obsidian 연동 성공"
                            : `Obsidian 연동 실패: ${r.obsidian_error || "unknown"}`;
                        card.innerHTML = `
                            <h3>${r.method} - 성공</h3>
                            <p class="filepath">${r.file}</p>
                            <p>${obsNote}</p>
                            <p>소요시간: ${r.elapsed}s</p>
                        `;
                    } else {
                        card.innerHTML = `
                            <h3>${r.method} - 실패</h3>
                            <p class="error-msg">${r.error}</p>
                            <p>소요시간: ${r.elapsed}s</p>
                        `;
                    }
                    resultsDiv.appendChild(card);
                }
            } catch (e) {
                resultsDiv.innerHTML = `<div class="result-card fail"><h3>Network Error</h3><p class="error-msg">${e.message}</p></div>`;
            } finally {
                btn.disabled = false;
                spinner.classList.remove("active");
            }
        }

        document.getElementById("url").addEventListener("keydown", e => {
            if (e.key === "Enter") doClip();
        });
    </script>
</body>
</html>
