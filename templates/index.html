<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Web Clipper</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 640px; width: 100%; }
        h1 { font-size: 1.6rem; margin-bottom: 1.5rem; color: #cba6f7; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.9rem; margin-bottom: 0.4rem; color: #a6adc8; }
        input[type="url"] {
            width: 100%;
            padding: 0.85rem 1rem;
            background: #313244;
            border: 1px solid #45475a;
            border-radius: 10px;
            color: #cdd6f4;
            font-size: 1.05rem;
        }
        input[type="url"]:focus { outline: none; border-color: #cba6f7; }

        .toggles {
            display: flex; gap: 0.5rem;
            margin-bottom: 1.4rem;
        }
        .toggle-btn {
            flex: 1;
            padding: 0.9rem 0.4rem;
            min-height: 48px;
            background: #313244;
            border: 2px solid #45475a;
            border-radius: 10px;
            color: #6c7086;
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            -webkit-user-select: none;
        }
        .toggle-btn.active {
            background: #45475a;
            border-color: #cba6f7;
            color: #cdd6f4;
        }
        .toggle-btn:active { transform: scale(0.97); }
        .toggle-btn.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

        #clip-btn {
            width: 100%;
            padding: 1rem;
            min-height: 52px;
            background: #cba6f7;
            color: #1e1e2e;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #clip-btn:active { transform: scale(0.98); }
        #clip-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .results { margin-top: 1.5rem; }
        .result-card {
            background: #313244;
            border-radius: 10px;
            padding: 1rem 1.1rem;
            margin-bottom: 0.8rem;
            border-left: 4px solid #45475a;
        }
        .result-card.success { border-left-color: #a6e3a1; }
        .result-card.fail { border-left-color: #f38ba8; }

        .result-card h3 {
            font-size: 1rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .result-card.success h3 { color: #a6e3a1; }
        .result-card.fail h3 { color: #f38ba8; }

        .result-card p { font-size: 0.9rem; margin: 0.3rem 0; color: #a6adc8; }
        .result-card .filepath { word-break: break-all; color: #89b4fa; }
        .result-card .error-msg { color: #f38ba8; }

        .spinner {
            display: none;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 1rem;
            color: #a6adc8;
        }
        .spinner.active { display: block; }

        @media (max-width: 480px) {
            body { padding: 1.2rem 0.8rem; }
            h1 { font-size: 1.4rem; }
            .toggles { gap: 0.4rem; }
            .toggle-btn { font-size: 0.85rem; padding: 0.85rem 0.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Obsidian Web Clipper</h1>

        <div class="form-group">
            <label for="url">URL</label>
            <input type="url" id="url" placeholder="https://example.com/article" autofocus>
        </div>

        <div class="toggles">
            <div class="toggle-btn active" id="tb-trafilatura" onclick="toggle(this)">trafilatura</div>
            <div class="toggle-btn active" id="tb-playwright" onclick="toggle(this)">playwright</div>
            <div class="toggle-btn disabled" id="tb-obsidian" title="추후 지원 예정">Obsidian API</div>
        </div>

        <button id="clip-btn" onclick="doClip()">Clip</button>

        <div class="spinner" id="spinner">Clipping...</div>
        <div class="results" id="results"></div>
    </div>

    <script>
        function toggle(el) { el.classList.toggle("active"); }

        async function doClip() {
            const url = document.getElementById("url").value.trim();
            if (!url) return alert("URL을 입력하세요");

            const methods = [];
            if (document.getElementById("tb-trafilatura").classList.contains("active")) methods.push("trafilatura");
            if (document.getElementById("tb-playwright").classList.contains("active")) methods.push("playwright");
            if (document.getElementById("tb-obsidian").classList.contains("active")) methods.push("obsidian");
            if (methods.filter(m => m !== "obsidian").length === 0) return alert("클리핑 방식을 하나 이상 선택하세요");

            const btn = document.getElementById("clip-btn");
            const spinner = document.getElementById("spinner");
            const resultsDiv = document.getElementById("results");

            btn.disabled = true;
            spinner.classList.add("active");
            resultsDiv.innerHTML = "";

            try {
                const resp = await fetch("/clip", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url, methods }),
                });
                const data = await resp.json();

                if (data.error) {
                    resultsDiv.innerHTML = `<div class="result-card fail"><h3>Error</h3><p class="error-msg">${data.error}</p></div>`;
                    return;
                }

                for (const r of data.results) {
                    const card = document.createElement("div");
                    card.className = `result-card ${r.success ? "success" : "fail"}`;

                    if (r.success) {
                        card.innerHTML = `
                            <h3>${r.method} - 성공</h3>
                            <p class="filepath">${r.file}</p>
                            <p>소요시간: ${r.elapsed}s</p>
                        `;
                    } else {
                        card.innerHTML = `
                            <h3>${r.method} - 실패</h3>
                            <p class="error-msg">${r.error}</p>
                            <p>소요시간: ${r.elapsed}s</p>
                        `;
                    }
                    resultsDiv.appendChild(card);
                }
            } catch (e) {
                resultsDiv.innerHTML = `<div class="result-card fail"><h3>Network Error</h3><p class="error-msg">${e.message}</p></div>`;
            } finally {
                btn.disabled = false;
                spinner.classList.remove("active");
            }
        }

        document.getElementById("url").addEventListener("keydown", e => {
            if (e.key === "Enter") doClip();
        });
    </script>
</body>
</html>
